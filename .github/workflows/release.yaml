name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race ./...

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For keyless signing with cosign

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup ko
        uses: ko-build/setup-ko@v0.8

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: build-tag
        env:
          KO_DOCKER_REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          IMAGE=$(ko build --bare --platform=linux/amd64,linux/arm64 \
            --sbom=spdx \
            --tags=${{ github.ref_name }} \
            --tags=latest .)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        id: build-main
        env:
          KO_DOCKER_REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          IMAGE=$(ko build --bare --platform=linux/amd64,linux/arm64 \
            --sbom=spdx \
            --tags=latest \
            --tags=${{ github.sha }} .)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ steps.build-tag.outputs.image || steps.build-main.outputs.image }}
        run: |
          cosign sign --yes "${IMAGE}"

      - name: Build only (PR)
        if: github.event_name == 'pull_request'
        env:
          KO_DOCKER_REPO: ko.local
        run: |
          ko build --bare --platform=linux/amd64,linux/arm64 .
